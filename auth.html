<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIS ESPORTS | Access Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

    <header class="navbar">
        <a href="index.html" class="brand-logo">
            <img src="Images/vis-logo.png" alt="VIS Esports Logo">
            <span>VIS ESPORTS</span>
        </a>
    </header>

    <section class="form-section">
        <div class="form-container auth-container">
            <div class="auth-toggle">
                <button id="loginToggle" class="toggle-btn active">Login</button>
                <button id="signupToggle" class="toggle-btn">Sign Up</button>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group full-width">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" class="form-control" required>
                </div>
                <div class="form-group full-width">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn-primary submit-btn">Enter Portal</button>
            </form>

            <form id="signupForm" class="auth-form hidden">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="regName">Username</label>
                        <input type="text" id="regName" class="form-control" placeholder="VIS_Pro" required>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" class="form-control" required>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn-primary submit-btn">Create Account</button>
            </form>
        </div>
    </section>

    <script>
        // ==========================================
// 7. AUTH PAGE TOGGLE LOGIC
// ==========================================
const loginToggle = document.getElementById('loginToggle');
const signupToggle = document.getElementById('signupToggle');
const loginForm = document.getElementById('loginForm');
const signupForm = document.getElementById('signupForm');

if (loginToggle && signupToggle) {
    loginToggle.addEventListener('click', () => {
        loginToggle.classList.add('active');
        signupToggle.classList.remove('active');
        loginForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
    });

    signupToggle.addEventListener('click', () => {
        signupToggle.classList.add('active');
        loginToggle.classList.remove('active');
        signupForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
    });
}
    </script>
</body>
</html>
